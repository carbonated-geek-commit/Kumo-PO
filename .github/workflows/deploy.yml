# Build & deploy to GitHub Pages.
# - Deploys on push to main and on manual dispatch.
# - Reusable (workflow_call) so a future content-sync can chain it —
#   never rely on a GITHUB_TOKEN push to trigger this workflow.
# - Weekly scheduled rebuild keeps time-relative content (footer year) fresh.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: "0 10 * * 1" # Mondays 10:00 UTC — weekly freshness rebuild

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Serving from https://OWNER.github.io/REPO/ until a custom domain
          # lands; then set PATH_PREFIX to "/" (or delete this env).
          PATH_PREFIX: "/${{ github.event.repository.name }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
